# Publicador automático de TakeOS.
# En cada push a main: construye el frontend con Vite y publica dist/ en GitHub Pages.
# Reemplaza el deploy manual y cierra el bug del 404.
name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues pisándose entre sí
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # El modo se elige según el repo: staging usa la base de staging,
      # producción la real. Mismo código, distinta base por entorno.
      - name: Build
        run: |
          if [ "${{ github.repository }}" = "agustinmunozrocha/takeos-staging" ]; then
            echo "Repo de STAGING -> build:staging (base de staging)"
            npm run build:staging
          else
            echo "Repo de PRODUCCIÓN -> build (base real)"
            npm run build
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
